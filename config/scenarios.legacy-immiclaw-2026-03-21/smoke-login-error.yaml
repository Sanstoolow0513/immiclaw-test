name: smoke-login-error
description: "验证错误凭据登录时显示错误提示，且能用正确凭据恢复登录"
target_url: "{base_url}/login"
goal: "先用 test_data 中 wrong_credentials 的凭据尝试登录，确认显示错误提示且不跳转；再用 correct_credentials 的凭据登录成功"
assertions:
  - "输入错误凭据后页面出现可见的错误提示文本"
  - "URL 仍为 /login，未跳转"
  - "输入正确凭据后成功登录，URL 变为 /cases"
max_steps: 20
timeout_seconds: 60
test_data:
  wrong_credentials:
    email: "readonly@test.com"
    password: "WrongPass!"
  correct_credentials:
    email: "readonly@test.com"
    password: "TestPass123!"
