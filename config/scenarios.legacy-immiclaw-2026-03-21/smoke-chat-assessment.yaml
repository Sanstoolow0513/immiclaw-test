name: smoke-chat-assessment
description: "验证初始评估流程能正常触发并完成"
target_url: "{base_url}/login"
goal: "使用 test_data 中 credentials 登录后，进入已提交问卷的案件工作区，验证初始评估自动触发并产生回复"
assertions:
  - "进入工作区后出现正在生成的加载状态（评估触发）"
  - "90 秒内收到评估回复（回复文本长度 > 0）"
  - "回复中包含 EB-1A 相关关键词（如杰出人才、EB-1A、移民之一）"
  - "如出现选项卡组件，点击某个选项后聊天区域出现新内容或加载状态"
  - "聊天区域无可见错误提示"
max_steps: 30
timeout_seconds: 180
test_data:
  credentials:
    email: "chat-assess@test.com"
    password: "TestPass123!"
  case_id: "auto"
