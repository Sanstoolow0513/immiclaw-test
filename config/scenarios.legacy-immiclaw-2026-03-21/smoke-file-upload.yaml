name: smoke-file-upload
description: "验证文件上传和预览功能"
target_url: "{base_url}/login"
goal: "使用 test_data 中 credentials 登录后，从案件列表中选择第一个案件进入工作区，在文件浏览区上传 upload_file 指定的文件，验证文件出现在列表中并可预览"
assertions:
  - "文件浏览区已渲染（文件列表或空状态可见）"
  - "点击上传按钮弹出上传对话框"
  - "上传测试文件后页面无可见错误提示"
  - "文件出现在文件列表中，文件名与上传文件一致"
  - "点击文件后预览区域有内容渲染"
max_steps: 25
timeout_seconds: 90
test_data:
  credentials:
    email: "file-upload@test.com"
    password: "TestPass123!"
  case_id: "auto"
  upload_file: "assets/files/test-upload.pdf"
