name: journey-case-workflow
description: "模拟已有用户的日常工作流——对话、上传文件、带上下文对话、查看进度"
target_url: "{base_url}/login"
goal: "使用 test_data 中 credentials 登录后，从案件列表选择第一个案件进入工作区，发送 message 消息并等待 AI 回复，然后上传 upload_file 文件，再发送 message_with_file 消息（带附件），最后查看 Todo 进度面板并刷新页面确认历史保留"
assertions:
  - "登录后 URL 变为 /cases，案件列表有内容"
  - "点击案件后进入工作区，聊天区域可见"
  - "发送消息后 60 秒内收到 AI 回复（回复文本长度 > 0）"
  - "上传文件成功，文件名出现在文件列表中"
  - "带附件发送消息后 AI 回复文本长度 > 0"
  - "Todo 进度面板可见"
  - "刷新页面后之前的消息仍然可见"
  - "全程无可见错误提示或超时提示"
max_steps: 45
timeout_seconds: 240
test_data:
  credentials:
    email: "journey-workflow@test.com"
    password: "TestPass123!"
  case_id: "auto"
  message: "请帮我分析一下我的材料准备情况"
  upload_file: "assets/files/test-doc.pdf"
  message_with_file: "请查看我上传的这份推荐信，帮我评估一下"
