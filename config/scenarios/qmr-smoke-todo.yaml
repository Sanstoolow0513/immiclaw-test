name: qmr-smoke-todo
description: "qmr_server 待办页：添加任务表单流程（可选提交一条测试任务）"
target_url: "{base_url}/todo"
goal: "确认页面标题「待办清单」与说明文案；点击「添加新任务」展开表单，在标题输入框填入 test_data 中的 todo_title 并提交（或若环境限制则至少验证表单字段：标题、描述、优先级、分类、添加按钮存在）；提交成功后列表中出现新任务或出现成功提示"
assertions:
  - "存在「返回首页」链向 /"
  - "添加任务交互可用：表单提交后无持续报错，或列表更新可见"
max_steps: 28
timeout_seconds: 150
test_data:
  todo_title: "E2E 测试任务 {timestamp}"
  todo_description: "由 immiclaw-test 场景自动添加，可手动删除"
