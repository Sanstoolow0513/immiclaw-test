name: smoke-case-manage
description: "验证案件的重命名和删除操作"
target_url: "{base_url}/login"
goal: "使用 test_data 中 credentials 登录后，先创建一个临时案件用于测试（填写最少必填信息即可），然后对该案件执行重命名（改为 rename_to 的值）和删除操作"
assertions:
  - "创建临时案件成功，该案件出现在列表中"
  - "重命名案件后列表中显示新名称"
  - "删除案件后该案件从列表中消失"
  - "操作过程中无可见错误提示"
max_steps: 30
timeout_seconds: 90
test_data:
  credentials:
    email: "case-manage-{timestamp}@test.com"
    password: "TestPass123!"
  rename_to: "测试重命名案件"
