name: smoke-file-browse
description: "验证文件夹的创建、重命名和删除操作"
target_url: "{base_url}/login"
goal: "使用 test_data 中 credentials 登录后，从案件列表中选择第一个案件进入工作区，在文件浏览区执行以下操作：1) 创建名为 new_folder_name 的新文件夹；2) 将该文件夹重命名为 rename_folder_to；3) 删除该文件夹"
assertions:
  - "文件目录树已渲染（至少有一个目录节点可见）"
  - "创建新文件夹后该文件夹名称出现在目录中"
  - "重命名文件夹后旧名称消失、新名称出现"
  - "删除文件夹后该项从目录消失"
  - "操作过程中页面无可见错误提示文本"
max_steps: 30
timeout_seconds: 90
test_data:
  credentials:
    email: "file-browse@test.com"
    password: "TestPass123!"
  case_id: "auto"
  new_folder_name: "测试文件夹"
  rename_folder_to: "重命名文件夹"
