name: smoke-chat-basic
description: "验证主工作区聊天的基本收发消息功能"
target_url: "{base_url}/login"
goal: "使用 test_data 中 credentials 登录后，从案件列表中选择第一个案件进入工作区，在聊天输入框中输入 message 的内容并发送，等待 AI 回复出现"
assertions:
  - "主工作区页面有可见内容，聊天区域可见"
  - "输入框可用，能输入文字"
  - "发送消息后出现正在生成的加载状态"
  - "60 秒内收到 AI 回复（回复文本长度 > 0）"
  - "回复消息渲染在聊天记录中"
  - "页面无可见错误提示"
max_steps: 25
timeout_seconds: 120
test_data:
  credentials:
    email: "chat-basic@test.com"
    password: "TestPass123!"
  case_id: "auto"
  message: "你好，请简单介绍一下EB-1A申请流程"
