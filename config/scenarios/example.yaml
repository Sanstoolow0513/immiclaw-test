name: example-qmr-home
description: "示例：验证 qmr_server 首页（写作空间）加载与核心文案"
target_url: "{base_url}"
goal: "打开首页，确认主标题包含「写作空间」，页面上能看到「博客」「Markdown 编辑器」「待办清单」三个入口区域或链接，且无可见的前端错误提示"
assertions:
  - "页面标题或主标题与 MyBlog / 写作空间 相关且非空"
  - "存在通往 /blog、/editor、/todo 的导航入口（链接或可点击区域）"
max_steps: 18
timeout_seconds: 90
test_data: {}
