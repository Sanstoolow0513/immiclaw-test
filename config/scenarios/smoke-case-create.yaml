name: smoke-case-create
description: "验证新建案件完整流程——填写问卷、上传简历、提交"
target_url: "{base_url}/login"
goal: "使用 test_data 中 credentials 登录后，点击新建案件，使用 questionnaire 中的数据填写问卷信息，上传 resume_file 指定的简历文件，提交后验证案件创建成功"
assertions:
  - "点击新建案件后 URL 包含 /cases/new，页面显示表单"
  - "填写各字段后字段值正确显示（无清空或报错）"
  - "上传简历文件后文件名出现在页面上"
  - "提交后 URL 变化（离开 /cases/new）"
  - "导航回案件列表后，新案件的名称出现在列表中"
max_steps: 35
timeout_seconds: 120
test_data:
  credentials:
    email: "case-create@test.com"
    password: "TestPass123!"
  questionnaire:
    name: "张三"
    birth_date: "1990-01-15"
    employer: "某科技公司"
    position: "高级研究员"
    industry: "人工智能"
    education: "博士"
    major: "计算机科学"
    immigration_intent: "希望通过EB-1A获得美国绿卡"
  resume_file: "assets/files/test-resume.pdf"
