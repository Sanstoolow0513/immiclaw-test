name: journey-file-management
description: "模拟用户集中整理案件材料的完整流程"
target_url: "{base_url}/login"
goal: "使用 test_data 中 credentials 登录后，从案件列表选择第一个案件进入工作区，在文件浏览区执行以下操作：1) 按 folders 列表依次创建文件夹；2) 将 upload_files 中的文件上传到第一个文件夹中；3) 预览上传的文件；4) 将第一个文件夹重命名为 rename_folder_to；5) 删除第二个上传的文件"
assertions:
  - "创建 test_data 中指定的文件夹后，这些文件夹名称出现在目录中"
  - "上传文件成功，文件名出现在文件列表中"
  - "点击文件后预览区域有内容渲染"
  - "重命名文件夹后旧名称消失、新名称出现"
  - "删除文件后该文件从列表消失"
  - "全程无可见错误提示"
max_steps: 40
timeout_seconds: 180
test_data:
  credentials:
    email: "journey-files@test.com"
    password: "TestPass123!"
  case_id: "auto"
  folders:
    - "推荐信"
    - "获奖材料"
    - "媒体报道"
  upload_files:
    - "assets/files/rec-letter.pdf"
    - "assets/files/award.pdf"
  rename_folder_to: "推荐信-已整理"
