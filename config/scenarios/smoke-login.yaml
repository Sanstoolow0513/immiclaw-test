name: smoke-login
description: "验证使用正确凭据登录后成功跳转到案件列表页"
target_url: "{base_url}/login"
goal: "打开登录页面，使用 test_data 中 credentials 的邮箱和密码登录，验证成功跳转到案件列表页"
assertions:
  - "登录页显示邮箱和密码输入框"
  - "输入凭据后点击登录按钮无报错"
  - "URL 变为 /cases"
  - "页面有可见内容（非白屏），案件列表区域已渲染"
max_steps: 15
timeout_seconds: 60
test_data:
  credentials:
    email: "readonly@test.com"
    password: "TestPass123!"
