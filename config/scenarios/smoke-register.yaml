name: smoke-register
description: "验证新用户注册流程完整可用"
target_url: "{base_url}/register"
goal: "打开注册页面，使用 test_data 中 new_user 的信息填写注册表单并提交，验证注册成功"
assertions:
  - "注册页面显示注册表单（含邮箱、密码、姓名输入框）"
  - "填写信息并提交后页面无可见错误提示"
  - "提交后 URL 变为 /cases 或 /login（注册成功）"
max_steps: 15
timeout_seconds: 60
test_data:
  new_user:
    email: "newuser-{timestamp}@test.com"
    password: "NewUserPass123!"
    name: "测试用户"
