name: qmr-smoke-blog-post
description: "qmr_server 博客详情：固定 slug 文章渲染与导航"
target_url: "{base_url}/blog/getting-started-with-nextjs"
goal: "打开 Next.js 入门指南（slug getting-started-with-nextjs）文章页，确认文章主标题可见，正文为 Markdown 渲染后的内容（含标题或段落）；页面上有返回文章列表的链接。test_data.blog_slug 供断言对照"
assertions:
  - "URL 路径包含正确的 slug，页面未出现 404 或「文章未找到」"
  - "存在返回 /blog 列表的导航"
max_steps: 22
timeout_seconds: 180
test_data:
  blog_slug: "getting-started-with-nextjs"
