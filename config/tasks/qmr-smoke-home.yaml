name: qmr-smoke-home
description: >-
  冒烟：根路径重定向与登录页骨架（ImmiClaw；非旧版 MyBlog 写作空间）。
  可作为 flow 中的入口校验场景；通常无需 test_data。
target_url: "{base_url}/"
goal: >-
  访问根路径，确认未登录用户被引导至登录页。页面应展示 ImmiClaw 登录卡片：
  主标题「ImmiClaw」、副标题「您的 AI 移民顾问」；表单含「请输入账号」「请输入密码」与「登录」。
  若已存在本地有效登录态而直接进入 /cases，则视为环境已登录，需先登出或清空会话后再测本场景。
assertions:
  - "URL 最终为 /login，或明确处于需登录前的入口页"
  - "可见 ImmiClaw 品牌相关文案，而非「写作空间」「博客」等无关产品文案"
  - "登录表单主要控件可见且可交互"
max_steps: 18
timeout_seconds: 90
test_data: {}
