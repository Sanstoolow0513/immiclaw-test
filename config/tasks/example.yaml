name: example-immiclaw-landing
description: >-
  示例：未登录访问根路径 → 登录页，验证 ImmiClaw 品牌与登录表单（与 frontend 路由 / → /cases → /login 一致）。
  可作为 flow 组装中的原子场景与其它 qmr-* 场景并列使用。
target_url: "{base_url}/"
goal: >-
  打开站点根地址，等待路由与鉴权重定向完成。未登录时应进入登录页（URL 含 /login）。
  确认页面可见 ImmiClaw 品牌文案（如主标题「ImmiClaw」、副标题「您的 AI 移民顾问」），
  可见占位符为「请输入账号」「请输入密码」的输入框与「登录」提交按钮。
  全程无白屏、无可见的前端错误边界或控制台级错误提示。
assertions:
  - "当前 URL 表明处于登录页（例如路径为 /login）"
  - "页面可见 ImmiClaw 或与本产品一致的品牌/副标题文案"
  - "存在账号、密码输入区域及可点击的登录按钮"
max_steps: 16
timeout_seconds: 60
test_data: {}
