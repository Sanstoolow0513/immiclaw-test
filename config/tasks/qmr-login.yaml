name: qmr-login
description: >-
  登录流：在 /login 使用 test_data 中的邮箱与密码提交表单，验证成功进入已登录态（/cases）。
  与 backend POST /api/auth/login、frontend Login 页一致；前端使用占位符「请输入账号」「请输入密码」，无 data-testid。
target_url: "{base_url}/login"
goal: >-
  在登录页仅使用 test_data 中的账号与密码：优先使用 account 与 password；
  若仅有 new_user（含 email、password），则用 email 作为账号、password 作为密码。
  在占位符为「请输入账号」的输入框填写邮箱，在「请输入密码」填写密码，点击「登录」提交。
  等待导航或网络稳定。成功标准：当前 URL 变为 /cases（或已进入受保护业务页），且页面上无红色错误提示块显示「账号或密码错误」等失败文案。
  禁止：注册新用户、修改密码、清除存储外的破坏性操作、对非本场景表单提交敏感信息、暴力重试登录（最多一次正式提交）。
  若 account 不是合法邮箱格式导致后端校验失败，应如实以 final_fail 结束并说明原因。
assertions:
  - "提交后 URL 已离开 /login，进入 /cases 或案件列表页"
  - "无可见的登录失败错误提示（红色错误区域）"
  - "未执行注册、改密或与登录无关的危险操作"
skills:
  - login
  - error-handling
max_steps: 26
timeout_seconds: 120
test_data:
  account: "3021018823@qq.com"
  password: "12345678"
